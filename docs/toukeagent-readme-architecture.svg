<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ToukeAgent README architecture diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="55%" stop-color="#f7fbf7"/>
      <stop offset="100%" stop-color="#fff8ee"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#174ea6"/>
      <stop offset="100%" stop-color="#2d7ff9"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#087f83"/>
      <stop offset="100%" stop-color="#13b8a6"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b05a00"/>
      <stop offset="100%" stop-color="#f59f28"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#1b355f" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#31506f"/>
    </marker>
    <style>
      .title { font: 800 38px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #102a43; }
      .subtitle { font: 500 18px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #52677a; }
      .panel-title { font: 800 22px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #102a43; }
      .panel-sub { font: 600 13px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7f93; }
      .item { font: 650 16px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #20384f; }
      .small { font: 600 13px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #60788d; }
      .chip { font: 800 13px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; letter-spacing: .5px; }
      .mono { font: 700 13px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; fill: #34495e; }
      .quote { font: 700 18px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #31506f; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <path d="M64 94 C260 24 455 48 637 94 C820 141 1005 110 1208 48" fill="none" stroke="#d8e6f7" stroke-width="28" stroke-linecap="round" opacity=".55"/>
  <path d="M38 650 C222 578 398 605 548 639 C730 681 908 684 1228 580" fill="none" stroke="#f4dec0" stroke-width="30" stroke-linecap="round" opacity=".7"/>

  <text x="64" y="74" class="title">ToukeAgent</text>
  <text x="64" y="105" class="subtitle">An agent-platform lab bench: planning, knowledge, memory, evaluation, and human control in one loop.</text>
  <text x="1088" y="74" class="quote">not just a prompt loop</text>

  <g filter="url(#shadow)">
    <rect x="64" y="150" width="300" height="390" rx="28" fill="#ffffff" stroke="#d8e6f7"/>
    <rect x="94" y="184" width="86" height="30" rx="15" fill="url(#blue)"/>
    <text x="137" y="204" text-anchor="middle" class="chip">NODE</text>
    <text x="94" y="250" class="panel-title">Platform Shell</text>
    <text x="94" y="275" class="panel-sub">server, SSE, stores, adapters</text>
    <circle cx="102" cy="324" r="5" fill="#2d7ff9"/>
    <text x="122" y="329" class="item">HTTP API and browser console</text>
    <circle cx="102" cy="366" r="5" fill="#2d7ff9"/>
    <text x="122" y="371" class="item">Streaming events and traces</text>
    <circle cx="102" cy="408" r="5" fill="#2d7ff9"/>
    <text x="122" y="413" class="item">Provider gateway and tools</text>
    <circle cx="102" cy="450" r="5" fill="#2d7ff9"/>
    <text x="122" y="455" class="item">Review, delivery, recovery</text>
    <text x="94" y="504" class="mono">apps/platform/*</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="490" y="150" width="300" height="390" rx="28" fill="#ffffff" stroke="#d9efe9"/>
    <rect x="520" y="184" width="98" height="30" rx="15" fill="url(#green)"/>
    <text x="569" y="204" text-anchor="middle" class="chip">PYTHON</text>
    <text x="520" y="250" class="panel-title">Agent Core</text>
    <text x="520" y="275" class="panel-sub">plan, route, compose, evaluate</text>
    <circle cx="528" cy="324" r="5" fill="#13b8a6"/>
    <text x="548" y="329" class="item">Plan-to-Act planning</text>
    <circle cx="528" cy="366" r="5" fill="#13b8a6"/>
    <text x="548" y="371" class="item">micro-ReAct step prep</text>
    <circle cx="528" cy="408" r="5" fill="#13b8a6"/>
    <text x="548" y="413" class="item">Hybrid retrieval router</text>
    <circle cx="528" cy="450" r="5" fill="#13b8a6"/>
    <text x="548" y="455" class="item">Quality gate decisions</text>
    <text x="520" y="504" class="mono">toukeagent_core/*</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="916" y="150" width="300" height="390" rx="28" fill="#ffffff" stroke="#f4dfbf"/>
    <rect x="946" y="184" width="112" height="30" rx="15" fill="url(#orange)"/>
    <text x="1002" y="204" text-anchor="middle" class="chip">EVIDENCE</text>
    <text x="946" y="250" class="panel-title">Knowledge + QA</text>
    <text x="946" y="275" class="panel-sub">memory, RAG, wiki, harnesses</text>
    <circle cx="954" cy="324" r="5" fill="#f59f28"/>
    <text x="974" y="329" class="item">RAG for stable context</text>
    <circle cx="954" cy="366" r="5" fill="#f59f28"/>
    <text x="974" y="371" class="item">Wiki cards for live facts</text>
    <circle cx="954" cy="408" r="5" fill="#f59f28"/>
    <text x="974" y="413" class="item">Memory and handoff state</text>
    <circle cx="954" cy="450" r="5" fill="#f59f28"/>
    <text x="974" y="455" class="item">Benchmarks and reviews</text>
    <text x="946" y="504" class="mono">tests/ scripts/ docs/</text>
  </g>

  <path d="M366 345 C405 345 444 345 482 345" fill="none" stroke="#31506f" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M792 345 C831 345 870 345 908 345" fill="none" stroke="#31506f" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M916 476 C768 614 512 615 364 476" fill="none" stroke="#71859b" stroke-width="3" stroke-dasharray="9 9" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="166" y="586" width="948" height="68" rx="24" fill="#ffffff" stroke="#e1e8f0"/>
    <text x="207" y="627" class="small">Request</text>
    <path d="M280 620 L377 620" stroke="#31506f" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="404" y="627" class="small">Plan</text>
    <path d="M459 620 L556 620" stroke="#31506f" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="584" y="627" class="small">Retrieve</text>
    <path d="M670 620 L767 620" stroke="#31506f" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="795" y="627" class="small">Compose</text>
    <path d="M890 620 L987 620" stroke="#31506f" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="1014" y="627" class="small">Gate + Trace</text>
  </g>
</svg>
